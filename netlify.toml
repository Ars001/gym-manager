# Netlify config — hosts the WHOLE app on one site (no card, no separate backend
# host): the React frontend as static files, and the Express API as a serverless
# function (netlify/functions/api.js via serverless-http).
#
# Set these environment variables in Netlify (Site settings -> Environment):
#   DATABASE_URL  = your Neon connection string (same one used locally)
#   JWT_SECRET    = any long random string
# Do NOT set VITE_API_BASE_URL — the frontend calls /api on the same site and
# the redirect below routes it to the function (so there is no CORS to deal with).

[build]
  # Netlify auto-installs the root package.json (the function's deps); this also
  # installs and builds the frontend.
  command = "npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg"]

# API calls -> serverless function.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Single-page-app fallback so client-side routes work on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers on every response. Camera stays allowed on our own origin
# because the check-in page uses it to scan QR codes.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
