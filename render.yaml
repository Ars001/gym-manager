# Render blueprint for the BACKEND (Express API in /backend).
# On Render: New + -> "Blueprint" -> connect this GitHub repo. Render reads this
# file and creates the service. Fill in the env vars marked sync:false in the
# dashboard (DATABASE_URL from Neon, CORS_ORIGIN = your Netlify site URL).
#
# The build runs db:setup (idempotent — CREATE TABLE IF NOT EXISTS) so tables
# exist on first deploy. Point DATABASE_URL at the SAME Neon database you use
# locally and your existing data (incl. demo data) shows up immediately.

services:
  - type: web
    name: gym-manager-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:setup
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in the dashboard
      - key: CORS_ORIGIN
        sync: false          # set to your Netlify URL, e.g. https://your-gym.netlify.app
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong secret automatically
      - key: JWT_EXPIRES_IN
        value: 7d
      # Optional Stripe keys (leave unset to run without real payments):
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
